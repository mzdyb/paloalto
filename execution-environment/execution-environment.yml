---
version: 3

images:
  base_image:
    name: registry.redhat.io/ansible-automation-platform-25/ee-minimal-rhel9:latest

options:
  package_manager_path: /usr/bin/microdnf

dependencies:
  galaxy:
    collections:
      - name: ansible.utils
        version: ">=3.0.0"
      - name: paloaltonetworks.panos
        version: ">=2.21.0"
  python:
    - pan-os-python>=1.12.0
    - xmltodict>=0.13.0
    - panos-upgrade-assurance>=0.4.0
