---
fw_virtual_router:
  name: "default"
  interfaces: ["ethernet1/1", "ethernet1/2", "ethernet1/3", "ethernet1/4", "ethernet1/5"]
  state: present

fw_static_routes:
  - name: "default"
    destination: "0.0.0.0/0"
    nexthop: "10.0.0.2"
    metric: 10
    virtual_router: "default"
    state: present

fw_interfaces:
  - if_name: "ethernet1/1"
    mode: "layer3"
    ip: ["10.0.0.1/30"]
    enable_dhcp: false
    create_default_route: false
    vr_name: default
    zone_name: untrust
    state: present
  - if_name: "ethernet1/2"
    mode: "layer3"
    ip: ["10.0.1.1/24"]
    enable_dhcp: false
    create_default_route: false
    vr_name: default
    zone_name: web
    state: present
  - if_name: "ethernet1/3"
    mode: "layer3"
    ip: ["10.0.2.1/24"]
    enable_dhcp: false
    create_default_route: false
    vr_name: default
    zone_name: db
    state: present
  - if_name: "ethernet1/4"
    mode: "layer3"
    ip: ["10.0.3.1/24"]
    enable_dhcp: false
    create_default_route: false
    vr_name: default
    state: present
  - if_name: "ethernet1/5"
    mode: "layer3"
    ip: ["10.0.4.1/24"]
    enable_dhcp: false
    create_default_route: false
    vr_name: default
    state: present
